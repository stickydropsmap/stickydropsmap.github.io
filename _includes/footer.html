      <img src="/assets/img/logo-aljibe.png" alt="SUPERFICIES BIOINSPIRADAS PARA RECOLECCIÓN DE AGUA ATMOSFÉRICA" style="height: 50px; filter: grayscale(100%); opacity: 0.8; transition: 0.3s;" onmouseover="this.style.filter='none'; this.style.opacity='1'" onmouseout="this.style.filter='grayscale(100%)'; this.style.opacity='0.8'">

      <img src="/assets/img/logo-lsip.png" alt="Laboratorio de Física de Superficies e Intefases" style="height: 50px; filter: grayscale(100%); opacity: 0.8; transition: 0.3s;" onmouseover="this.style.filter='none'; this.style.opacity='1'" onmouseout="this.style.filter='grayscale(100%)'; this.style.opacity='0.8'">

      <img src="/assets/img/logo-ugr.png" alt="Universidad de Granada" style="height: 50px; filter: grayscale(100%); opacity: 0.8; transition: 0.3s;" onmouseover="this.style.filter='none'; this.style.opacity='1'" onmouseout="this.style.filter='grayscale(100%)'; this.style.opacity='0.8'">

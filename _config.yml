# Navigation links (shown in the top menu)
navbar-links:
  Inicio: "/"
  ¡Participa!: "/participate"
  ¿Qué es StickyDropsMap?: "/about"

# Optional social links shown in footer
social-network-links:
  email: "marodri@ugr.es"
  instagram: "lsip_ugr"
  twitter: "lsip_ugr"
  #github: MiguelARodriguezValverde

# Site colours (Beautiful Jekyll v5+)
navbar-col: "#2e7d32"
navbar-text-col: "#ffffff"
navbar-hover-col: "#1b5e20"
page-col: "#ffffff"
link-col: "#2e7d32"
hover-col: "#1b5e20"
footer-col: "#f8f9fa"
footer-text-col: "#555555"
footer-link-col: "#2e7d32"

# Footer text
footer-extra-content: ""

# Markdown extras
markdown: kramdown
highlighter: rouge
permalink: /:title/

# Plugins (GitHub Pages safe)

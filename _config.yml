# Site settings
#title: StickyDropsMap
title: "<img src='/assets/img/logo.png' style='height:35px; margin-right:10px; vertical-align:middle;'> StickyDropsMap"
description: >
  Mapa de superficies vegetales con alta captación de agua atmosférica -
  Proyecto de Ciencia Ciudadana
logo: "/assets/img/logo.png"
#avatar: "/assets/img/logo.png"
favicon-img: "/assets/img/favicon.ico?v=1"
author: Universidad de Granada

# Remote theme (Beautiful Jekyll)
